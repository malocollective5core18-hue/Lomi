<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lomi-Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>

/* Lomi-Store - Converted from Tailwind to Plain CSS */

:root {
  --background: 220 33% 97%;
  --foreground: 222 47% 11%;
  --card: 0 0% 100%;
  --card-foreground: 222 47% 11%;
  --popover: 0 0% 100%;
  --popover-foreground: 222 47% 11%;
  --primary: 156 49% 11%;
  --primary-foreground: 40 33% 97%;
  --secondary: 210 40% 96%;
  --secondary-foreground: 222 47% 11%;
  --muted: 210 40% 96%;
  --muted-foreground: 215 16% 47%;
  --accent: 32 95% 44%;
  --accent-foreground: 0 0% 100%;
  --destructive: 0 84% 60%;
  --destructive-foreground: 0 0% 100%;
  --success: 158 64% 21%;
  --success-foreground: 158 50% 92%;
  --border: 214 32% 91%;
  --input: 214 32% 91%;
  --sidebar-background: 0 0% 100%;
  --sidebar-foreground: 222 47% 11%;
  --sidebar-primary: 156 49% 11%;
  --sidebar-accent: 210 40% 96%;
  --sidebar-border: 214 32% 91%;
  --radius: 1rem;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  padding: 0;
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

.min-h-screen { min-height: 100vh; }
.bg-background { background: hsl(var(--background)); }
.text-foreground { color: hsl(var(--foreground)); }

/* Header */
header.sticky {
  position: sticky;
  top: 0;
  z-index: 110;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  padding: 0 4px;
  border-bottom: 1px solid hsl(var(--border));
  background: hsl(var(--card) / 0.95);
  backdrop-filter: blur(12px);
}

@media (min-width: 768px) {
  header {
    height: 70px;
    padding: 0 10px;
  }
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.325rem;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
}

.text-brand {
  background: linear-gradient(145deg, hsl(158 64% 21%), hsl(32 95% 35%));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.menu-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: hsl(var(--muted));
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}

.menu-btn:active { transform: scale(0.95); }

.menu-btn span {
  display: block;
  width: 20px;
  height: 2px;
  background: hsl(var(--foreground));
  border-radius: 1px;
}

/* Main */
main {
  padding-bottom: 40px;
}

/* Hero Carousel */
.carousel-section {
  margin: 12px;
  overflow: hidden;
  border-radius: 1.5rem;
  background: hsl(var(--card));
  box-shadow: 0 2px 8px hsl(222 47% 11% / 0.04);
}

@media (min-width: 640px) { .carousel-section { margin: 20px; } }
@media (min-width: 768px) { .carousel-section { margin: 40px; } }
@media (min-width: 1024px) {
  .carousel-section {
    margin-left: auto;
    margin-right: auto;
    max-width: 1400px;
  }
}

.carousel-track {
  display: flex;
  transition: transform 0.5s ease-out;
}

.carousel-slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  min-width: 100%;
  padding: 24px;
  background: linear-gradient(135deg, hsl(48 96% 95%) 0%, hsl(0deg 98.53% 49.98%) 100%);
  text-align: center;
  cursor: pointer;
}

@media (min-width: 640px) {
  .carousel-slide {
    flex-direction: row;
    padding: 32px;
    text-align: left;
  }
}

@media (min-width: 768px) { .carousel-slide { padding: 48px; } }

.carousel-content { flex: 1; }

.carousel-title {
  margin-bottom: 8px;
  font-size: 1.25rem;
  font-weight: 800;
  line-height: 1.2;
}

@media (min-width: 640px) { .carousel-title { font-size: 1.5rem; } }
@media (min-width: 768px) { .carousel-title { font-size: 1.875rem; } }

.carousel-desc {
  font-size: 0.875rem;
  color: hsl(215deg 81.98% 24.68%);
}

@media (min-width: 640px) { .carousel-desc { font-size: 1rem; } }

.carousel-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 4px 12px;
  border-radius: 9999px;
  background: hsl(var(--accent));
  font-size: 0.75rem;
  font-weight: 700;
  color: hsl(var(--accent-foreground));
}

.carousel-badge.hot {
  background: linear-gradient(135deg, hsl(9 95% 58%), hsl(29 95% 48%));
  color: hsl(0 0% 100%);
}
.carousel-badge.trending {
  background: linear-gradient(135deg, hsl(156 49% 22%), hsl(171 74% 36%));
  color: hsl(0 0% 100%);
}
.carousel-badge.popular {
  background: linear-gradient(135deg, hsl(244 67% 58%), hsl(220 74% 52%));
  color: hsl(0 0% 100%);
}

.carousel-meta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}

.carousel-image-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-image {
  width: min(68vw, 220px);
  aspect-ratio: 1 / 1;
  border-radius: 1rem;
  object-fit: cover;
}

.carousel-discount-burst {
  position: absolute;
  top: -68px;
  right: -55px;
  display: grid;
  place-items: center;
  width: 86px;
  height: 86px;
  padding: 10px;
  background: radial-gradient(circle at 35% 35%, hsl(322.49deg 100% 50%) 58%, hsl(14 91% 48%) 100%);
  clip-path: polygon(50% 0%, 60% 12%, 74% 4%, 78% 20%, 92% 14%, 88% 30%, 100% 38%, 88% 50%, 100% 62%, 86% 70%, 92% 86%, 78% 80%, 74% 96%, 60% 88%, 50% 100%, 40% 88%, 26% 96%, 22% 80%, 8% 86%, 14% 70%, 0% 62%, 12% 50%, 0% 38%, 12% 30%, 8% 14%, 22% 20%, 26% 4%, 40% 12%);
  box-shadow: 0 18px 30px hsl(15 85% 38% / 0.32);
  color: hsl(0 0% 100%);
  text-align: center;
}

.carousel-discount-burst.free-burst {
  top: -62px;
  right: -37px;
  width: 78px;
  height: 78px;
  border-radius: 50%;
  clip-path: none;
  background: hsl(0deg 100% 50%);
  box-shadow: 0 18px 30px hsl(0 72% 42% / 0.34);
}

.carousel-discount-burst strong { display: block; font-size: 1.15rem; line-height: 1; }
.carousel-discount-burst span {
  display: block;
  margin-top: 3px;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.carousel-discount-burst.desktop-only { display: none; }

@media (min-width: 640px) {
  .carousel-image { width: 240px; flex: 0 0 240px; }
}
@media (min-width: 768px) {
  .carousel-image { width: 320px; flex-basis: 320px; }
}
@media (min-width: 1024px) {
  .carousel-discount-burst.mobile-only { display: none; }
  .carousel-discount-burst.desktop-only {
    position: static;
    display: grid;
    margin-left: 31px;
  }
  .carousel-discount-burst.desktop-only.free-burst {
    width: 78px;
    height: 78px;
    margin-left: 31px;
  }
  .carousel-discount-burst.desktop-only strong { font-size: 1.3rem; }
  .carousel-discount-burst.desktop-only span { font-size: 0.68rem; }
}

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  background: hsl(var(--card));
}

.carousel-dot {
  width: 8px;
  height: 8px;
  border: none;
  border-radius: 9999px;
  background: hsl(var(--border));
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.2s;
}

.carousel-dot.active { width: 28px; background: hsl(var(--accent)); }
.carousel-dot:not(.active):hover { background: hsl(var(--muted-foreground)); }

/* Search Section */
.search-section {
  margin: 12px;
  display: flex;
  flex-direction: row;
  gap: 12px;
  padding: 14px;
  border: 1px solid hsl(34 92% 56% / 0.28);
  border-radius: 1.35rem;
  background: linear-gradient(135deg, hsl(45 100% 96%) 0%, hsl(31 100% 92%) 52%, hsl(156 45% 94%) 100%);
}

@media (min-width: 640px) { .search-section { margin: 20px; } }
@media (min-width: 768px) { .search-section { margin: 40px; } }
@media (min-width: 1024px) {
  .search-section { margin-left: auto; margin-right: auto; max-width: 1400px; }
}

.search-wrapper { position: relative; flex: 2; }

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: hsl(var(--muted-foreground));
  pointer-events: none;
}

.input-field {
  width: 100%;
  padding: 7px 15px;
  border: 1px solid hsl(32 80% 62% / 0.45);
  border-radius: 9999px;
  background: hsl(0 0% 100% / 0.96);
  font-size: 0.75rem;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-field:focus {
  border-color: hsl(var(--accent));
  box-shadow: 0 0 0 3px hsl(var(--accent) / 0.3);
}

.input-field.pl-11 { padding-left: 44px; }

.category-select {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid hsl(32 80% 62% / 0.45);
  border-radius: 9999px;
  background: hsl(0 0% 100% / 0.96);
  font-size: 0.75rem;
  font-weight: 500;
  outline: none;
  cursor: pointer;
}

.category-select:focus { border-color: hsl(var(--accent)); }

/* Products Grid */
.products-section { margin: 12px; }
@media (min-width: 640px) { .products-section { margin: 20px; } }
@media (min-width: 768px) { .products-section { margin: 40px; } }
@media (min-width: 1024px) {
  .products-section { margin-left: auto; margin-right: auto; max-width: 1400px; }
}

.section-title {
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.25rem;
  font-weight: 800;
}

.text-accent { color: hsl(var(--accent)); }

.section-count {
  margin-left: 8px;
  font-size: 0.875rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
}

.free-status-badge {
  margin-left: auto;
  padding: 5px 10px;
  border-radius: 9999px;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
  cursor: pointer;
}

.free-status-badge.on {
  background: hsl(var(--success) / 0.14);
  color: hsl(var(--success));
}

.free-status-badge.off {
  background: hsl(var(--destructive) / 0.14);
  color: hsl(var(--destructive));
}

.products-grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: calc((100% - 0px) / 3.1);
  gap: 8px;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  padding-bottom: 8px;
  scroll-snap-type: x proximity;
  scrollbar-width: thin;
}

.products-grid::-webkit-scrollbar { height: 6px; }
.products-grid::-webkit-scrollbar-thumb { border-radius: 9999px; background: hsl(var(--border)); }
.products-grid > .product-card { min-width: 0; scroll-snap-align: start; }

@media (min-width: 640px) {
  .products-grid {
    grid-auto-flow: row;
    grid-auto-columns: auto;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    overflow-x: visible;
    padding-bottom: 0;
    scroll-snap-type: none;
  }
}
@media (min-width: 768px) { .products-grid { gap: 20px; } }
@media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1280px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }

/* Product Card */
.product-card {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 0.85rem;
  background: hsl(var(--card));
  box-shadow: 0 2px 8px hsl(222 47% 11% / 0.04);
  transition: box-shadow 0.2s, transform 0.2s;
}

.product-card.spotlight {
  box-shadow: 0 0 0 4px hsl(var(--accent) / 0.5), 0 0 0 10px hsl(var(--accent) / 0.16), 0 18px 36px hsl(222 47% 11% / 0.18);
  transform: translateY(-6px) scale(1.02);
  animation: spotlightPulse 0.9s ease-in-out 2;
}

@keyframes spotlightPulse {
  0% { box-shadow: 0 0 0 0 hsl(var(--accent) / 0.45), 0 0 0 0 hsl(var(--accent) / 0.18), 0 18px 36px hsl(222 47% 11% / 0.12); }
  50% { box-shadow: 0 0 0 5px hsl(var(--accent) / 0.55), 0 0 0 14px hsl(var(--accent) / 0.2), 0 22px 42px hsl(222 47% 11% / 0.18); }
  100% { box-shadow: 0 0 0 4px hsl(var(--accent) / 0.5), 0 0 0 10px hsl(var(--accent) / 0.16), 0 18px 36px hsl(222 47% 11% / 0.18); }
}

.product-card:hover { box-shadow: 0 10px 30px hsl(222 47% 11% / 0.08); }

.product-img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: hsl(var(--muted)); }

.product-content {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  padding: 10px;
}

.product-category {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 0.56rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: hsl(var(--accent));
}

.product-category span:first-of-type { min-width: 0; }

.id_number-badge {
  flex: 0 0 auto;
  padding: 3px 8px;
  border-radius: 9999px;
  background: hsl(32deg 3.28% 88.59%);
  font-size: 0.52rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  color: hsl(0deg 0% 0%);
  white-space: nowrap;
}

.product-title { margin-bottom: 4px; font-size: 0.82rem; font-weight: 700; line-height: 1.25; }

.product-desc {
  margin-bottom: 12px;
  font-size: 0.62rem;
  color: hsl(var(--muted-foreground));
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-prices {
  margin-bottom: 12px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) max-content;
  align-items: center;
  gap: 4px 6px;
  margin-top: auto;
  min-width: 0;
}

.old-price {
  grid-column: 1;
  min-width: 0;
  max-width: 100%;
  font-size: 0.62rem;
  color: hsl(var(--muted-foreground));
  text-decoration: line-through;
  white-space: nowrap;
  overflow: hidden;
}

.current-price {
  grid-column: 1;
  min-width: 0;
  max-width: 100%;
  font-size: 0.7rem;
  font-weight: 800;
  color: hsl(var(--primary));
  white-space: nowrap;
  overflow: hidden;
}

.discount-badge {
  grid-column: 2;
  grid-row: 1 / span 2;
  align-self: center;
  justify-self: end;
  min-width: max-content;
  max-width: 100%;
  padding: 2px 6px;
  border-radius: 9999px;
  background: hsl(var(--destructive));
  font-size: 0.52rem;
  font-weight: 700;
  color: hsl(var(--destructive-foreground));
  white-space: nowrap;
}

.discount-badge.free-badge {
  font-size: 0.7rem;
  color: hsl(var(--success-foreground));
}

@media (max-width: 420px) {
  .product-prices { grid-template-columns: minmax(0, 1fr); }
  .discount-badge { grid-column: 1; grid-row: auto; justify-self: end; margin-top: 2px; }
}

.product-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.availability-btn {
  padding: 5px 8px;
  border: none;
  border-radius: 9999px;
  font-size: 0.58rem;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}

@media (min-width: 640px) {
  .product-card { border-radius: 1rem; }
  .product-content { padding: 16px; }
  .product-category { font-size: 0.65rem; }
  .id_number-badge { font-size: 0.62rem; }
  .product-title { font-size: 1rem; }
  .product-desc { font-size: 0.75rem; }
  .product-prices { gap: 8px; }
  .old-price { font-size: 0.75rem; }
  .current-price { font-size: 0.85rem; }
  .discount-badge.free-badge { font-size: 0.85rem; }
  .discount-badge { padding: 2px 8px; font-size: 0.65rem; }
  .availability-btn { padding: 6px 12px; font-size: 0.7rem; }
}

.availability-btn:active { transform: scale(0.95); }
.availability-btn.available { background: hsl(var(--success) / 0.15); color: hsl(var(--success)); }
.availability-btn.unavailable { background: hsl(var(--destructive) / 0.1); color: hsl(var(--destructive)); }

.admin-actions { display: flex; align-items: center; gap: 4px; }

.edit-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
  color: hsl(var(--accent));
  background: transparent;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}

.edit-btn:active { transform: scale(0.95); }

.delete-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 9999px;
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  background: transparent;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s, color 0.1s;
}

.delete-btn:active { transform: scale(0.95); }
.delete-btn:hover { color: hsl(var(--destructive)); }

/* Dashboard */
.dashboard-section {
  margin: 12px;
  border-radius: 1.5rem;
  background: hsl(var(--card));
  padding: 20px;
  box-shadow: 0 2px 8px hsl(222 47% 11% / 0.04);
}

@media (min-width: 640px) { .dashboard-section { margin: 20px; padding: 24px; } }
@media (min-width: 768px) { .dashboard-section { margin: 40px; padding: 32px; } }
@media (min-width: 1024px) {
  .dashboard-section { margin-left: auto; margin-right: auto; max-width: 1400px; }
}

.dashboard-header {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

@media (min-width: 768px) {
  .dashboard-header { flex-direction: row; align-items: center; justify-content: space-between; }
}

.dashboard-title {
  font-size: 1.25rem;
  font-weight: 800;
}

@media (min-width: 768px) { .dashboard-title { font-size: 1.5rem; } }

/* FIXED: removed hardcoded margin-left:77% */
.dashboard-badge {
  align-self: flex-end;
  padding: 4px 12px;
  border-radius: 9999px;
  background: hsl(var(--secondary));
  font-size: 0.75rem;
  font-weight: 600;
  color: hsl(var(--secondary-foreground));
}

.dashboard-form {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

@media (min-width: 768px) {
  .dashboard-form { grid-template-columns: repeat(2, 1fr); }
}

.form-field { display: flex; flex-direction: column; }
.form-field.full-width { grid-column: 1 / -1; }

.form-label {
  margin-bottom: 4px;
  display: block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: hsl(var(--muted-foreground));
}

.form-textarea { resize: none; }

.form-file {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px;
  border: 2px dashed hsl(var(--border));
  border-radius: 1rem;
  background: hsl(var(--muted) / 0.4);
  text-align: center;
  font-size: 0.875rem;
  cursor: pointer;
  transition: background 0.1s;
}

.form-file:hover { background: hsl(var(--accent) / 0.05); }
.form-file input { display: none; }
.form-file i { font-size: 1.125rem; }

.preview-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 104px;
  margin-top: 8px;
  border: 1px dashed hsl(var(--border));
  border-radius: 0.875rem;
  background: hsl(var(--card));
}

.preview-shell.is-loading::after {
  content: "Loading image...";
  font-size: 0.75rem;
  font-weight: 600;
  color: hsl(var(--muted-foreground));
}

.preview-placeholder { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }

.preview-image {
  width: min(100%, 160px);
  height: 96px;
  border-radius: 0.75rem;
  object-fit: cover;
}

.form-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

@media (min-width: 768px) {

// ====== RETRY HELPER ======
async function withRetry(fn, retries = 2, delayMs = 800) {
  let lastError;
  for (let i = 0; i <= retries; i++) {
    try {
      return await fn();
    } catch (err) {
      lastError = err;
      if (i < retries) await new Promise(r => setTimeout(r, delayMs * (i + 1)));
    }
  }
  throw lastError;
}

// ====== CLOUDINARY UPLOAD ======
async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLD_PRESET);
  formData.append("folder", CLD_FOLDER);

  const response = await withRetry(async () => {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`, {
      method: "POST",
      body: formData,
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Cloudinary upload failed (${res.status})`);
    }
    return res.json();
  }, 2, 1000);

  if (!response.secure_url) {
    throw new Error("Cloudinary did not return a URL");
  }
  return { url: response.secure_url, public_id: response.public_id };
}

// ====== SUPABASE OPERATIONS ======
async function fetchProductsFromSupabase() {
  if (!hasRemoteBackend()) return [];
  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .order("created_at", { ascending: false });
  if (error) throw new Error(error.message);
  return (data || []).map(mapSupabaseProduct);
}

async function fetchAgentsFromSupabase() {
  if (!hasRemoteBackend()) return [];
  const { data, error } = await supabaseClient
    .from("agents")
    .select("*")
    .order("created_at", { ascending: false });
  if (error) throw new Error(error.message);
  return (data || []).map(mapSupabaseAgent);
}

async function fetchSettingsFromSupabase() {
  if (!hasRemoteBackend()) return null;
  const { data, error } = await supabaseClient
    .from("shop_settings")
    .select("key, value")
    .in("key", ["default_location_link", "product_id_sequence"]);
  if (error) throw new Error(error.message);

  const mapped = { defaultLocationLink: "", productIdSequence: 1 };
  (data || []).forEach(item => {
    if (item.key === "default_location_link") mapped.defaultLocationLink = item.value || "";
    if (item.key === "product_id_sequence") mapped.productIdSequence = Math.max(1, Number(item.value) || 1);
  });
  return mapped;
}

async function syncProductToSupabase(product) {
  if (!hasRemoteBackend()) return;
  return withRetry(async () => {
    const { error } = await supabaseClient
      .from("products")
      .upsert([mapProductToSupabase(product)], { onConflict: "id" });
    if (error) throw new Error(error.message);
  });
}

async function deleteProductFromSupabase(productId) {
  if (!hasRemoteBackend()) return;
  return withRetry(async () => {
    const { error } = await supabaseClient.from("products").delete().eq("id", productId);
    if (error) throw new Error(error.message);
  });
}

async function syncAgentToSupabase(agent) {
  if (!hasRemoteBackend()) return;
  return withRetry(async () => {
    const { error } = await supabaseClient
      .from("agents")
      .upsert([mapAgentToSupabase(agent)], { onConflict: "id" });
    if (error) throw new Error(error.message);

}

async function deleteAgentFromSupabase(agentId) {

}

async function syncSettingsToSupabase(settings) {
  if (!hasRemoteBackend()) return;
  const payload = [
    { key: "default_location_link", value: settings.defaultLocationLink || "", description: "Default Google Maps link for all products" },
    { key: "product_id_sequence", value: String(Math.max(1, Number(settings.productIdSequence) || 1)), description: "Current product ID sequence number" },
  ];
  return withRetry(async () => {
    const { error } = await supabaseClient.from("shop_settings").upsert(payload, { onConflict: "key" });
    if (error) throw new Error(error.message);
  });
}

async function hydrateRemoteState() {
  if (!hasRemoteBackend()) return;
  showLoadingOverlay("Syncing store data…");
  try {
    const [pRes, aRes, sRes] = await Promise.allSettled([
      fetchProductsFromSupabase(),
      fetchAgentsFromSupabase(),
      fetchSettingsFromSupabase(),
    ]);

    if (pRes.status === "rejected") console.warn("Products fetch failed:", pRes.reason);
    if (aRes.status === "rejected") console.warn("Agents fetch failed:", aRes.reason);
    if (sRes.status === "rejected") console.warn("Settings fetch failed:", sRes.reason);

    const remoteProducts = pRes.status === "fulfilled" ? pRes.value : [];
    const remoteAgents   = aRes.status === "fulfilled" ? aRes.value : [];
    const remoteSettings = sRes.status === "fulfilled" ? sRes.value : null;

    if (remoteSettings) state.settings = { ...state.settings, ...remoteSettings };

    const { products } = ensureProductIdNumbers(remoteProducts || []);
    state.products = products;
    state.agents   = remoteAgents || [];

    saveProducts();
    saveAgents(state.agents);
    saveSettings();

    renderMain();
  } catch (err) {
    console.error("Remote hydration error:", err);
  } finally {
    hideLoadingOverlay();
  }
}

async function replaceStateFromSupabase() {
  if (!hasRemoteBackend()) return;
  const [pRes, aRes, sRes] = await Promise.allSettled([
    fetchProductsFromSupabase(),
    fetchAgentsFromSupabase(),
    fetchSettingsFromSupabase(),
  ]);

  const remoteProducts = pRes.status === "fulfilled" ? pRes.value : state.products;
  const remoteAgents   = aRes.status === "fulfilled" ? aRes.value : state.agents;
  const remoteSettings = sRes.status === "fulfilled" ? sRes.value : null;

  if (remoteSettings) state.settings = { ...state.settings, ...remoteSettings };
  const { products } = ensureProductIdNumbers(remoteProducts || []);
  state.products = products;
  state.agents   = remoteAgents || [];
  saveProducts();
  saveAgents(state.agents);
  saveSettings();
}

function subscribeToProductChanges() {
  if (!hasRemoteBackend() || productsSubscription) return;
  productsSubscription = supabaseClient
    .channel("products_channel")
    .on("postgres_changes", { event: "*", schema: "public", table: "products" }, async () => {
      try {
        if (hasDashboardDraft()) return;
        await replaceStateFromSupabase();
        if (state.view === "home" || state.view === "dashboard" || state.view === "agents") renderMain();
      } catch (err) { console.error("Realtime refresh failed:", err); }
    })
    .subscribe();
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function fitPriceText(root = document) {
  root.querySelectorAll(".product-prices .old-price, .product-prices .current-price").forEach(node => {
    const base = parseFloat(node.dataset.baseFontSize || window.getComputedStyle(node).fontSize);
    node.dataset.baseFontSize = String(base);
    node.style.fontSize = `${base}px`;
    let next = base;
    while (node.scrollWidth > node.clientWidth && next > 8) {
      next -= 0.5;
      node.style.fontSize = `${next}px`;
    }
  });
}

function formatPrice(amount) {
  const value = Number(amount);
  if (!Number.isFinite(value)) return "0Tzsh/=";
  if (value <= 0) return "Free";
  return `${Math.round(value).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 })}Tzsh/=`;
}

function isFreePrice(amount) {
  const v = Number(amount);
  return Number.isFinite(v) && v <= 0;
}

function formatPhoneLink(phone) {
  return `tel:${String(phone || "").replace(/[^\d+]/g, "")}`;
}

function buildDirectionsUrl(sharedLink) {
  const raw = String(sharedLink || "").trim();
  if (!raw) return "";
  try {
    const url = new URL(raw);
    const params = url.searchParams;
    let dest = params.get("destination") || params.get("query") || params.get("q");
    if (!dest) {
      const atM = url.href.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
      const mM  = url.href.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
      const pM  = url.pathname.match(/\/place\/([^/]+)/);
      if (atM) dest = `${atM[1]},${atM[2]}`;
      else if (mM) dest = `${mM[1]},${mM[2]}`;
      else if (pM) dest = decodeURIComponent(pM[1]).replace(/\+/g, " ");
    }
    if (!dest) return raw;
    return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`;
  } catch { return raw; }
}

function getAlphabetPrefix(index) {
  let v = index, r = "";
  do { r = String.fromCharCode(65 + (v % 26)) + r; v = Math.floor(v / 26) - 1; } while (v >= 0);
  return r;
}

function formatProductNumber(seq) {
  const block = Math.floor((seq - 1) / 999);
  const num   = ((seq - 1) % 999) + 1;
  if (block === 0) return String(num);
  return `${getAlphabetPrefix(block - 1)}${num}`;
}

function ensureProductIdNumbers(products) {
  const used = new Set();
  let seq = Math.max(1, Number(state.settings.productIdSequence) || 1);
  let changed = false;
  const normalized = products.map(p => {
    if (p.idNumber && !used.has(p.idNumber)) { used.add(p.idNumber); return p; }
    while (seq === 666 || used.has(formatProductNumber(seq))) seq++;
    const idNumber = formatProductNumber(seq);
    used.add(idNumber); seq++; changed = true;
    return { ...p, idNumber };
  });
  while (seq === 666 || used.has(formatProductNumber(seq))) seq++;
  state.settings.productIdSequence = seq;
  return { products: normalized, changed };
}

function getNextProductIdNumber() {
  const used = new Set(state.products.map(p => p.idNumber).filter(Boolean));
  let seq = Math.max(1, Number(state.settings.productIdSequence) || 1);
  while (seq === 666 || used.has(formatProductNumber(seq))) seq++;
  const idNumber = formatProductNumber(seq);
  state.settings.productIdSequence = seq + 1;
  saveSettings();
  return idNumber;
}

function saveDashboardFormData(event) {
  if (state.view !== "dashboard") return;
  const form = event?.target?.form || event?.currentTarget || $(".dashboard-form");
  if (!form) return;
  const data = {};
  form.querySelectorAll("input, select, textarea").forEach(el => {
    if (el.name) {
      if (el.type === "checkbox" || el.type === "radio") data[el.name] = el.checked;
      else data[el.name] = el.value;
    }
  });
  state.dashboardFormData = data;
}

}

function renderProducts() {

// ====== XSS HELPER ======
function escHtml(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ====== ACTIONS ======
function getFilteredAgents() {
  const term = state.agentSearch.toLowerCase();
  return state.agents.filter(a => {
    const matchSearch = !term || a.fullName.toLowerCase().includes(term) || a.email.toLowerCase().includes(term);
    const matchFilter = state.agentFilter === "all" || a.status === state.agentFilter;
    return matchSearch && matchFilter;
  });
}

function getAgentSubscriptionMeta(agent) {
  const days = Math.max(0, Number(agent.subscriptionDays) || 0);
  if ((agent.plan || "Free Plan") === "Free Plan") {
    return days > 0 ? `${days} day${days !== 1 ? "s" : ""} left on free plan` : "Free plan expired";
  }
  return days > 0 ? `${days} day${days !== 1 ? "s" : ""} left` : "Subscription expired";
}

function formatAgentCreatedAt(createdAt) {
  if (!createdAt) return "Recently";
  const date = new Date(createdAt);
  if (Number.isNaN(date.getTime())) return "Recently";
  return date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function getFilteredProducts() {
  const term = state.search.toLowerCase();
  return state.products.filter(p => {
    const matchSearch  = p.title.toLowerCase().includes(term) || String(p.idNumber || "").toLowerCase().includes(term);
    const matchCat     = state.category === "all" || (p.category || "Uncategorized") === state.category;
    const matchTrend   = state.productFilter !== "trending" || p.trending;
    const matchFree    = state.productFilter !== "free" || isFreePrice(p.price);
    const matchAgent   = !state.agentProductFilterId || p.agentId === state.agentProductFilterId;
    return matchSearch && matchCat && matchTrend && matchFree && matchAgent;
  });
}

function toggleSidebar(open) { state.sidebarOpen = open; renderSidebar(); }
function openAuth() { state.authOpen = true; state.authMode = "login"; toggleSidebar(false); renderAuthModal(); }
function closeAuth() { state.authOpen = false; renderAuthModal(); }

function openAgentModal(id = null) {
  if (!isAdminUser()) { toast("Admin access required", "error"); return; }
  state.agentEditing = id ? { ...state.agents.find(a => a.id === id) } : null;
  state.agentModalOpen = true;
  renderAgentModal();
}

function closeAgentModal() { state.agentModalOpen = false; state.agentEditing = null; renderAgentModal(); }
function toggleAuthMode() { state.authMode = state.authMode === "login" ? "signup" : "login"; renderAuthModal(); }

function handleAuthSubmit() {
  const email    = $("#auth-email")?.value?.trim();
  const password = $("#auth-password")?.value?.trim();
  if (!email || !password) { toast("Please enter credentials", "error"); return; }
  const users = loadUsers();

  if (state.authMode === "login") {
    const foundUser  = users.find(u => u.email === email && u.password === password);
    const foundAgent = state.agents.find(a => a.email === email && a.password === password);
    if (!foundUser && !foundAgent) { toast("Invalid credentials", "error"); return; }
    if (foundAgent) {
      if (foundAgent.status === "suspended") { toast("This agent account is suspended", "error"); return; }
      state.user = { email: foundAgent.email, role: "agent", agentId: foundAgent.id, fullName: foundAgent.fullName };
    } else {
      state.user = { email: foundUser.email, role: foundUser.role };
    }
    saveSession(state.user);
    toast(`Welcome, ${state.user.email}`, "success");
    if (state.user.role === "admin" || state.user.role === "agent") state.view = "dashboard";
    closeAuth();
    render();
  } else {
    if (users.find(u => u.email === email)) { toast("User already exists", "error"); return; }
    users.push({ email, password, role: "user" });
    saveUsers(users);
    toast("Account created — please login", "success");
    toggleAuthMode();
  }
}

function handleLogout() {
  state.user = null; saveSession(null);
  state.view = "home"; state.editing = null;
  state.isEditingDashboard = false; state.dashboardFormData = {};
  toggleSidebar(false); toast("Logged out", "success");
  render();
}

  refreshProductsSection();
  requestAnimationFrame(() => {
    const next = document.getElementById("product-search-input");
    if (!next) return;
    next.focus();
    next.setSelectionRange(ss, se);
  });
}

function handleAgentSearch(value) {
  const inp = document.getElementById("agent-search-input");
  const ss = inp?.selectionStart ?? value.length;
  const se = inp?.selectionEnd ?? value.length;
  state.agentSearch = value; renderMain();

    const next = document.getElementById("agent-search-input");

    next.focus(); next.setSelectionRange(ss, se);
  });
}

async function handleAgentSubmit(event) {
  event.preventDefault();
  if (!isAdminUser()) { toast("Admin access required", "error"); return; }

  const fd   = new FormData(event.target);
  const fullName        = fd.get("fullName")?.toString().trim();
  const email           = fd.get("email")?.toString().trim().toLowerCase();
  const password        = fd.get("password")?.toString() || "";
  const confirmPassword = fd.get("confirmPassword")?.toString() || "";
  const plan            = fd.get("plan")?.toString() || "Free Plan";
  const subscriptionDays = Math.max(0, parseInt(fd.get("subscriptionDays"), 10) || 0);

  if (!fullName || !email) { toast("Full name and email are required", "error"); return; }
  if (!state.agentEditing && !password) { toast("Password is required", "error"); return; }
  if ((password || confirmPassword) && password !== confirmPassword) { toast("Passwords do not match", "error"); return; }

  const duplicate = state.agents.find(a => a.email === email && a.id !== state.agentEditing?.id);
  if (duplicate) { toast("An agent with that email already exists", "error"); return; }

  const prev = state.agents.map(a => ({ ...a }));

  if (state.agentEditing) {
    const updated = state.agents.map(a => a.id !== state.agentEditing.id ? a
      : { ...a, fullName, email, plan, subscriptionDays, password: password || a.password });
    const upAgent = updated.find(a => a.id === state.agentEditing.id);
    try {
      if (upAgent) await syncAgentToSupabase(upAgent);
    } catch (err) { state.agents = prev; toast(err.message || "Agent sync failed", "error"); renderMain(); return; }
    state.agents = updated;
    saveAgents(state.agents);
    toast("Agent updated", "success");
  } else {
    const newAgent = {
      id: crypto.randomUUID(), fullName, email, password, plan, subscriptionDays,
      status: "active", createdAt: new Date().toISOString(),
    };
    try {
      await syncAgentToSupabase(newAgent);
    } catch (err) { state.agents = prev; toast(err.message || "Agent sync failed", "error"); renderMain(); return; }
    state.agents = [newAgent, ...state.agents];
    saveAgents(state.agents);
    toast("Agent registered", "success");
  }

  state.view = "agents";
  closeAgentModal();
  renderMain();
}

async function toggleAgentSuspended(id) {
  if (!isAdminUser()) { toast("Admin access required", "error"); return; }
  const prev = state.agents.map(a => ({ ...a }));
  const updated = state.agents.map(a =>
    a.id !== id ? a : { ...a, status: a.status === "suspended" ? "active" : "suspended" }
  );
  state.agents = updated;
  saveAgents(state.agents);
  try {
    const upAgent = state.agents.find(a => a.id === id);
    if (upAgent) await syncAgentToSupabase(upAgent);
  } catch (err) {
    state.agents = prev; saveAgents(state.agents);
    toast(err.message || "Agent sync failed", "error"); renderMain(); return;
  }
  renderMain();
}

async function deleteAgent(id) {
  if (!isAdminUser()) { toast("Admin access required", "error"); return; }
  if (!confirm("Delete this agent?")) return;
  const prev = state.agents.map(a => ({ ...a }));
  state.agents = state.agents.filter(a => a.id !== id);
  saveAgents(state.agents);
  try {
    await deleteAgentFromSupabase(id);
  } catch (err) {
    state.agents = prev; saveAgents(state.agents);
    toast(err.message || "Agent sync failed", "error"); renderMain(); return;
  }
  toast("Agent deleted", "success");
  renderMain();
}

function toggleTrendingPicker(id) {
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  state.trendingPickerOpenFor = state.trendingPickerOpenFor === id ? null : id;
  renderProductModal();
}

function closeTrendingPicker() { state.trendingPickerOpenFor = null; renderProductModal(); }
function handleTrendingBadgeSelect(id, badgeKey) { if (badgeKey) setTrendingProduct(id, badgeKey); }

async function setTrendingProduct(id, badgeKey) {
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  const selectedBadge = carouselBadgeOptions[badgeKey] ? badgeKey : "trending";
  const prev = state.products.map(p => ({ ...p }));
  const prevSel = state.selectedProduct ? { ...state.selectedProduct } : null;
  let updatedProd = null;
  state.products = state.products.map(p => {
    if (p.id !== id) return p;
    updatedProd = { ...p, trending: true, carouselBadge: selectedBadge };
    return updatedProd;
  });
  if (!updatedProd) return;
  saveProducts();
  state.selectedProduct = { ...updatedProd };
  state.trendingPickerOpenFor = null;
  try {
    await syncProductToSupabase(updatedProd);
  } catch (err) {
    state.products = prev; state.selectedProduct = prevSel; state.trendingPickerOpenFor = null;
    toast(err.message || "Sync failed", "error"); renderMain(); renderProductModal(); return;
  }
  renderMain(); renderProductModal();
  toast(`${updatedProd.title} added to ${carouselBadgeOptions[selectedBadge].label}`, "success");
}

async function removeFromTrending(id) {
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  const prev = state.products.map(p => ({ ...p }));
  const prevSel = state.selectedProduct ? { ...state.selectedProduct } : null;
  let updatedProd = null;
  state.products = state.products.map(p => {
    if (p.id !== id) return p;
    updatedProd = { ...p, trending: false };
    return updatedProd;
  });
  if (!updatedProd) return;
  saveProducts();
  state.selectedProduct = { ...updatedProd };
  state.trendingPickerOpenFor = null;
  try {
    await syncProductToSupabase(updatedProd);
  } catch (err) {
    state.products = prev; state.selectedProduct = prevSel; state.trendingPickerOpenFor = null;
    toast(err.message || "Sync failed", "error"); renderMain(); renderProductModal(); return;
  }
  renderMain(); renderProductModal();
  toast("Product removed from trending", "success");
}

async function handleToggleAvailable(id) {
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  const prev = state.products.map(p => ({ ...p }));
  state.products = state.products.map(p => p.id === id ? { ...p, available: !p.available } : p);
  saveProducts();
  try {
    const up = state.products.find(p => p.id === id);
    if (up) await syncProductToSupabase(up);
  } catch (err) {
    state.products = prev; saveProducts();
    toast(err.message || "Sync failed", "error"); renderMain(); return;
  }
  renderMain();
}

async function handleDelete(id) {
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  if (!confirm("Delete this product?")) return;
  const prev = state.products.map(p => ({ ...p }));
  state.products = state.products.filter(p => p.id !== id);
  saveProducts();
  try {
    await deleteProductFromSupabase(id);
  } catch (err) {
    state.products = prev; saveProducts();
    toast(err.message || "Sync failed", "error"); renderMain(); return;
  }
  toast("Product deleted", "success");
  renderMain();
}

function handleEdit(id) {
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  const p = state.products.find(p => p.id === id);
  if (p) {
    state.dashboardFormData = {}; state.editing = { ...p };
    state.view = "dashboard"; render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

function openProductModal(id) {
  const p = state.products.find(p => p.id === id);
  if (!p) return;
  state.selectedProduct = { ...p };
  state.trendingPickerOpenFor = null;
  renderProductModal();
}

function closeProductModal() { state.selectedProduct = null; state.trendingPickerOpenFor = null; renderProductModal(); }
function openInfoModal({ title, message, type }) { state.infoModal = { title, message, type }; renderInfoModal(); }
function closeInfoModal() { state.infoModal = null; renderInfoModal(); }
function openDirectionsGuide(link) { state.directionsGuideLink = String(link || "").trim(); renderDirectionsGuideModal(); }
function closeDirectionsGuide() { state.directionsGuideLink = ""; renderDirectionsGuideModal(); }
function confirmDirectionsGuide() {
  const link = state.directionsGuideLink;
  closeDirectionsGuide();
  if (link) window.open(link, "_blank", "noopener,noreferrer");
}

let pendingImage = "";
let pendingImageFile = null;

function setUploadPreviewState({ loading = false, image = "", showPlaceholder = false } = {}) {
  const shell = $(".preview-shell");
  if (!shell) return;
  shell.classList.toggle("is-loading", loading);
  if (loading) { shell.innerHTML = ""; return; }
  if (image) { shell.innerHTML = `<img src="${escHtml(image)}" alt="Preview" class="preview-image">`; return; }
  if (showPlaceholder) shell.innerHTML = `<span class="preview-placeholder">Image preview will appear here</span>`;
}

function handleFileUpload(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  // Validate file type and size
  if (!file.type.startsWith("image/")) { toast("Please upload an image file", "error"); return; }
  if (file.size > 10 * 1024 * 1024) { toast("Image must be under 10MB", "error"); return; }

  pendingImageFile = file;
  setUploadPreviewState({ loading: true });

  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = ev.target?.result;
    setUploadPreviewState({ image: pendingImage });
  };
  reader.onerror = () => {
    pendingImage = ""; pendingImageFile = null;
    setUploadPreviewState({ showPlaceholder: true });
    toast("Image failed to load", "error");
  };
  reader.readAsDataURL(file);
}

async function handleProductSubmit(event) {
  event.preventDefault();
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }

  const fd    = new FormData(event.target);
  const title = fd.get("title")?.toString().trim();
  const price = fd.get("price")?.toString();
  const phone = fd.get("phone")?.toString().trim();
  const defaultLocationLink = fd.get("defaultLocationLink")?.toString().trim() || "";

  if (!title || !price || !phone) { toast("Title, price and phone are required", "error"); return; }

  let image = pendingImage || state.editing?.image;
  if (!image) { toast("Please upload an image", "error"); return; }

  let cloudinaryPublicId = state.editing?.cloudinaryPublicId || "";

  if (pendingImageFile) {
    showLoadingOverlay("Uploading image…");
    try {
      const uploaded = await uploadToCloudinary(pendingImageFile);
      image = uploaded.url;
      cloudinaryPublicId = uploaded.public_id;
    } catch (err) {
      hideLoadingOverlay();
      toast(err.message || "Image upload failed", "error");
      return;
    } finally {
      hideLoadingOverlay();
    }
  }

  const productData = {
    title,
    category: fd.get("category")?.toString().trim() || "Uncategorized",
    oldPrice: fd.get("oldPrice") ? parseFloat(fd.get("oldPrice")) : null,
    price: parseFloat(price),
    phone,
    agentId: fd.get("agentId")?.toString().trim() || "",
    locationLink: fd.get("locationLink")?.toString().trim() || "",
    desc: fd.get("desc")?.toString().trim() || "Premium item",
    image,
    cloudinaryPublicId,
    trending: state.editing?.trending || false,
    carouselBadge: state.editing?.carouselBadge || "trending",
    idNumber: state.editing?.idNumber || "",
  };

  const prevProds = state.products.map(p => ({ ...p }));
  const prevSettings = { ...state.settings };
  state.settings.defaultLocationLink = defaultLocationLink;
  saveSettings();

  showLoadingOverlay("Saving product…");
  try {
    if (state.editing) {
      state.isEditingDashboard = false; state.dashboardFormData = {};
      const editId = state.editing.id;
      state.products = state.products.map(p => p.id === editId ? { ...p, ...productData } : p);
      const up = state.products.find(p => p.id === editId);
      if (up) await syncProductToSupabase(up);
      await syncSettingsToSupabase(state.settings);
      toast("Product updated", "success");
      state.editing = null;
    } else {
      state.isEditingDashboard = false; state.dashboardFormData = {};
      const newProd = { ...productData, id: crypto.randomUUID(), idNumber: getNextProductIdNumber(), available: true };
      state.products = [newProd, ...state.products];
      await syncProductToSupabase(newProd);
      await syncSettingsToSupabase(state.settings);
      toast("Product added", "success");
    }
  } catch (err) {
    state.products = prevProds; state.settings = prevSettings;
    saveProducts(); saveSettings();
    toast(err.message || "Sync failed", "error");
    renderMain(); return;
  } finally {
    hideLoadingOverlay();
  }

  saveProducts();
  pendingImage = ""; pendingImageFile = null;
  event.target.reset();
  renderMain();
}

function cancelEdit() {
  state.editing = null; state.isEditingDashboard = false; state.dashboardFormData = {};
  pendingImage = ""; pendingImageFile = null;
  renderMain();
}

function showAgentProducts(agentId) {
  state.view = "home"; state.productFilter = "all"; state.agentProductFilterId = agentId;
  state.category = "all"; state.search = "";
  toggleSidebar(false); renderMain();
  requestAnimationFrame(() => { $(".products-section")?.scrollIntoView({ behavior: "smooth", block: "start" }); });
}

function selectCategory(cat) { state.category = cat; state.view = "home"; render(); }

// ====== CAROUSEL ======
function initCarousel() {
  const track   = $(".carousel-track");
  const trending = getTrendingProducts();
  if (!track || trending.length <= 1) { stopCarousel(); return; }
  stopCarousel();
  carouselInterval = setInterval(() => {
    carouselIndex = (carouselIndex + 1) % trending.length;
    updateCarousel();
  }, 4500);
}

function stopCarousel() {
  if (carouselInterval) { clearInterval(carouselInterval); carouselInterval = null; }
}

function goToSlide(index) { carouselIndex = index; updateCarousel(); stopCarousel(); initCarousel(); }

function updateCarousel() {
  const track = $(".carousel-track");
  const dots   = $$(".carousel-dot");
  if (track) track.style.transform = `translateX(-${carouselIndex * 100}%)`;
  dots.forEach((dot, i) => dot.classList.toggle("active", i === carouselIndex));
}

// ====== POLLING ======
let pollTimer = null;

async function pollForNewElements() {
  if (!hasRemoteBackend() || hasDashboardDraft()) return;
  try {
    await replaceStateFromSupabase();
    if (state.view === "home" || state.view === "dashboard" || state.view === "agents") renderMain();
  } catch (err) { console.error("Poll refresh failed:", err); }
}

function startPollTimer() {
  if (pollTimer) clearInterval(pollTimer);
  if (hasRemoteBackend()) pollTimer = setInterval(pollForNewElements, 12000);
}

// ====== INIT ======
async function init() {
  // Load local state first for fast render
  state.settings = loadSettings();
  state.products  = loadProducts();
  state.agents    = loadAgents();
  state.user      = loadSession();

  const app = $("#app");
  app.className = "min-h-screen bg-background";
  app.innerHTML = "";

  render();
  showIntroVideoOverlay();

  // Then hydrate from Supabase
  await hydrateRemoteState();
  subscribeToProductChanges();
  startPollTimer();

  window.addEventListener("offline", () => toast("You are offline — changes saved locally", "error"));
  window.addEventListener("online",  () => toast("Back online", "success"));
}

document.addEventListener("DOMContentLoaded", init);

  </script>
